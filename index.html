<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Battleship - The Game</title>
</head>
<body>
    <h1>Battleship</h1>
    <section id = 'game'>
        <h3>Captain, we need to line up the ships!</h3>
      <div class = 'player-field'></div>
      <div class="ships-choice">
        <div id = 'Carrier'  draggable="true">Carrier</div> 
        <div id = 'Battleship'  draggable="true">Battleship</div>
        <div id = 'Cruiser' draggable="true">Cruiser</div>
        <div id = 'Submarine'  draggable="true">Submarine</div>
        <div id = 'Destroyer'  draggable="true">Destroyer</div>
      </div>
      <button>Start Battle!</button>
    </section>
    <script src = "./battleship.js"></script>
</body>
</html>
